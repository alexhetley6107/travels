<div class="search-bar">
  <input
    class="search-input"
    type="text"
    placeholder="Місто, наприклад: Kyiv, Paris, Berlin"
    [(ngModel)]="query"
    (keydown)="onKeydown($event)"
  />
  <button class="btn btn-primary" (click)="search()" [disabled]="loading() || locating()">
    @if (loading()) {
      <span class="spinner"></span>
    } @else {
      Пошук
    }
  </button>
  <!-- <button class="btn btn-outline" (click)="searchNearby()" [disabled]="locating() || loading()">
      @if (locating()) {
        <span class="spinner"></span>
      } @else {
        📍 Поруч
      }
    </button> -->
</div>

@if (error()) {
  <p class="error">{{ error() }}</p>
}

@if (places().length) {
  <p class="results-count">Знайдено: {{ places().length }}</p>
  <div class="places-grid">
    @for (place of places(); track place.xid) {
      <app-place-card [place]="place" />
    }
  </div>
}

@if (!loading() && !locating() && !places().length && !error()) {
  <div class="empty-state">
    <span>🗺️</span>
    <p>Введіть назву міста або натисніть «Поруч»</p>
  </div>
}
